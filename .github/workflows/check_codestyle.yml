name: 'Check: Codestyle'

on:
  pull_request:
  workflow_dispatch:

jobs:
  codestyle:
    runs-on: ubuntu-slim
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install CMake
        run: |
          sudo apt update
          sudo apt install -y cmake  

      - name: Test MF coding style
        run: |
          cmake -P ./buildscripts/ci/checkcodestyle/checkcodestyle.cmake ./framework/
